# Flask API + Admin Panel — KAIROX backend
#
# IMPORTANT: Only intercept specific Flask routes.
# Grafana uses /api/ internally (/api/dashboards/, /api/datasources/,
# /api/login/, etc.). The previous broad "location ^~ /api/" was
# intercepting Grafana's own internal API requests and sending them
# to Flask, which returned 404 and broke Grafana.
#
# Fix: enumerate only the exact Flask route prefixes.
# Everything else falls through to location / → Grafana.

location ^~ /api/v1/       { proxy_pass http://ro-python-worker:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }
location ^~ /api/command/  { proxy_pass http://ro-python-worker:8080; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 60s; }
