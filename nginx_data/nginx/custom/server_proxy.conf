# Flask API + Admin Panel — KAIROX backend
# Paths /api/ and /admin/ route to Flask before Grafana's location /
# Uses ^~ modifier: these locations win over plain location /

location ^~ /api/ {
    proxy_pass         http://ro-python-worker:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

location ^~ /admin/ {
    proxy_pass         http://ro-python-worker:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
